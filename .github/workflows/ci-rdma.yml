name: MinIO C++ Cmake (RDMA)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "Ubuntu_RDMA_GCC_amd64",
            os: ubuntu-latest,
            arch: "amd64",
            build_type: "Release",
          }
        - {
            name: "Ubuntu_RDMA_GCC_arm64",
            os: ubuntu-24.04-arm,
            arch: "arm64",
            build_type: "Release",
          }

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
    - name: Checkout minio-cpp
      uses: actions/checkout@v4
      with:
        path: "minio-cpp"

    - name: Checkout vcpkg
      uses: actions/checkout@v4
      with:
        repository: microsoft/vcpkg
        path: "vcpkg"

    - name: Install dependencies
      run: |
        sudo apt-get -qy update
        sudo apt-get -qy install cmake libibverbs-dev librdmacm-dev libnuma-dev
        cmake --version

    - name: Configure and Build
      shell: bash
      run: |
        ./vcpkg/bootstrap-vcpkg.sh
        cd minio-cpp
        ../vcpkg/vcpkg install
        cmake . -B ./build \
          -DCMAKE_BUILD_TYPE=${{matrix.config.build_type}} \
          -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DMINIO_CPP_TEST:BOOL=ON \
          -DMINIO_CPP_ENABLE_RDMA:BOOL=ON
        cmake --build ./build --config ${{matrix.config.build_type}} -j 4
